<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Journey of Us: Amir & Septian</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="apps/assets/css/style.css">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        rose: {
                            50: '#fff1f2',
                            100: '#ffe4e6',
                            200: '#fecdd3',
                            300: '#fda4af',
                            400: '#fb7185',
                            500: '#f43f5e',
                            600: '#e11d48',
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        cursive: ['Great Vibes', 'cursive'],
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-rose-50 text-gray-800 font-sans overflow-x-hidden">

    <canvas id="confetti-canvas"></canvas>

    <!-- Navigation -->
    <nav class="fixed w-full z-50 glass shadow-sm transition-all duration-300" id="navbar">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0">
                    <a href="#" class="font-cursive text-3xl font-bold text-rose-600">A & S</a>
                </div>
                <div class="hidden md:block">
                    <div class="ml-10 flex items-baseline space-x-8">
                        <a href="#home" class="text-gray-700 hover:text-rose-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Home</a>
                        <a href="#story" class="text-gray-700 hover:text-rose-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Our Story</a>
                        <a href="#gallery" class="text-gray-700 hover:text-rose-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Memories</a>
                        <a href="#reasons" class="text-gray-700 hover:text-rose-600 px-3 py-2 rounded-md text-sm font-medium transition-colors">Why I Love You</a>
                    </div>
                </div>
                <div>
                    <a href="#proposal" class="bg-rose-500 hover:bg-rose-600 text-white px-6 py-2 rounded-full text-sm font-medium transition-colors shadow-lg shadow-rose-200">The Question</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="relative min-h-screen flex items-center justify-center overflow-hidden">
        <!-- Background Image/Gradient -->
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80" alt="Romantic Background" class="w-full h-full object-cover opacity-30" />
            <div class="absolute inset-0 bg-gradient-to-b from-rose-100/80 via-rose-50/90 to-rose-50"></div>
        </div>
        
        <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
            <h2 id="hero-subtitle" class="text-sm md:text-base tracking-[0.3em] text-rose-500 uppercase font-semibold mb-4 animate-fade-in-up"></h2>
            <h1 id="hero-title" class="font-cursive text-7xl md:text-9xl text-gray-900 mb-6 drop-shadow-sm"></h1>
            <p id="hero-description" class="font-serif text-xl md:text-2xl text-gray-700 mb-10 italic max-w-2xl mx-auto leading-relaxed"></p>
            <div class="flex justify-center">
                <a href="#story" class="group flex flex-col items-center text-rose-500 hover:text-rose-600 transition-colors">
                    <span id="hero-scroll-text" class="text-sm font-medium uppercase tracking-widest mb-2"></span>
                    <svg class="w-6 h-6 animate-bounce" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
                </a>
            </div>
        </div>
        
        <!-- Floating hearts animation elements -->
        <div class="absolute top-1/4 left-1/4 text-rose-300 opacity-50 animate-float" style="animation-delay: 0s;">❤️</div>
        <div class="absolute top-1/3 right-1/4 text-rose-400 opacity-30 animate-float" style="animation-delay: 1.5s; font-size: 2rem;">❤️</div>
        <div class="absolute bottom-1/4 left-1/3 text-rose-200 opacity-60 animate-float" style="animation-delay: 3s; font-size: 1.5rem;">❤️</div>
    </section>

    <!-- Our Story Timeline -->
    <section id="story" class="py-24 bg-white relative">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 fade-in-section">
                <h2 id="timeline-title" class="font-cursive text-5xl md:text-6xl text-rose-600 mb-4"></h2>
                <div class="w-24 h-1 bg-rose-200 mx-auto rounded-full"></div>
                <p id="timeline-subtitle" class="mt-4 text-gray-600 font-serif italic"></p>
            </div>

            <div class="relative">
                <!-- Line -->
                <div class="absolute left-1/2 transform -translate-x-1/2 h-full w-1 bg-rose-100 hidden md:block"></div>
                
                <!-- Timeline container for JS population -->
                <div id="timeline-container"></div>
            </div>
        </div>
    </section>

    <!-- Gallery Section -->
    <section id="gallery" class="py-24 heart-bg">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 fade-in-section">
                <h2 id="gallery-title" class="font-cursive text-5xl md:text-6xl text-rose-600 mb-4"></h2>
                <div class="w-24 h-1 bg-rose-300 mx-auto rounded-full"></div>
                <p id="gallery-subtitle" class="mt-4 text-gray-700 font-serif italic"></p>
            </div>

            <div id="gallery-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6"></div>
            
            <p class="text-center mt-10 text-sm text-gray-500 italic">*(Nanti bisa diganti dengan foto-foto asli kalian berdua)*</p>
        </div>
    </section>

    <!-- Reasons I Love You -->
    <section id="reasons" class="py-24 bg-white">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16 fade-in-section">
                <h2 id="reasons-title" class="font-cursive text-5xl md:text-6xl text-rose-600 mb-4"></h2>
                <div class="w-24 h-1 bg-rose-200 mx-auto rounded-full"></div>
            </div>

            <div id="reasons-container" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
        </div>
    </section>

    <!-- The Proposal -->
    <section id="proposal" class="min-h-screen bg-rose-600 flex items-center justify-center relative overflow-hidden py-24">
        <!-- Background Pattern -->
        <div class="absolute inset-0 opacity-10">
            <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <pattern id="hearts" width="60" height="60" patternUnits="userSpaceOnUse">
                        <path fill="#ffffff" d="M30,55 C30,55 10,35 10,20 C10,10 25,10 30,20 C35,10 50,10 50,20 C50,35 30,55 30,55 Z" transform="scale(0.5) translate(30, 30)"/>
                    </pattern>
                </defs>
                <rect width="100%" height="100%" fill="url(#hearts)" />
            </svg>
        </div>

        <div class="relative z-10 max-w-2xl mx-auto px-4 w-full">
            <div id="proposal-card" class="bg-white rounded-3xl shadow-2xl p-8 md:p-14 text-center transform transition-all duration-700">
                <div class="w-20 h-20 bg-rose-100 rounded-full flex items-center justify-center mx-auto mb-8">
                    <svg class="w-10 h-10 text-rose-500" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
                    </svg>
                </div>
                
                <h2 id="proposal-target" class="font-serif text-3xl md:text-4xl text-gray-800 mb-6 font-bold"></h2>
                <p id="proposal-message" class="text-gray-600 mb-10 text-lg md:text-xl leading-relaxed font-serif italic"></p>
                
                <h1 id="proposal-question" class="font-cursive text-5xl md:text-7xl text-rose-600 mb-12 drop-shadow-sm"></h1>

                <div class="flex flex-col sm:flex-row justify-center items-center gap-6 relative min-h-[60px]" id="button-container">
                    <button id="yes-btn" class="bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 px-12 rounded-full shadow-lg shadow-rose-300 transform hover:scale-110 transition-all text-xl w-48 z-20"></button>
                    <!-- Tombol No dibuat absolute agar bisa dipindah-pindah dengan mudah menggunakan JS -->
                    <button id="no-btn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 px-12 rounded-full shadow-sm transition-all text-xl w-48 absolute sm:relative right-0 sm:right-auto z-10 cursor-pointer"></button>
                </div>

                <div id="success-message" class="hidden mt-8">
                    <h3 id="success-title" class="font-cursive text-4xl text-rose-500 mb-2"></h3>
                    <p id="success-message-text" class="text-gray-600 font-serif"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 py-8 text-center text-sm">
        <p id="footer-text"></p>
    </footer>

    <!-- Scripts -->
    <!-- Confetti Script (Canvas Confetti CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Custom Main Script -->
    <script src="apps/assets/js/main.js"></script>
</body>
</html>
